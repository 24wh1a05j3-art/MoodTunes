<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTunes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🎵 MoodTunes</h1>

        <p class="subtitle">
            Find music that matches your mood.
        </p>

        <div class="mood-section">

            <h2>Choose Your Mood</h2>

            <div class="mood-buttons">

                <button>😊 Happy</button>
                <button>😔 Sad</button>
                <button>❤️ Love</button>
                <button>😌 Relaxed</button>
                <button>⚡ Energetic</button>
                <button>😡 Angry</button>

            </div>

        </div>

        <!-- Recommended Songs -->
        <div class="card">
            <h2>🎶 Recommended Songs</h2>

            <ul id="songList">
                <li>Your songs will appear here.</li>
            </ul>
        </div>

        <!-- Quote -->
        <div class="card">
            <h2>💬 Quote of the Day</h2>

            <p id="quote">
                Every day is a fresh start.
            </p>
        </div>

        <!-- Wallpaper -->
        <div class="card">
            <h2>🖼️ Mood Wallpaper</h2>

            <img
                id="wallpaper"
                src="https://picsum.photos/id/1025/900/400"
                alt="Mood Wallpaper">
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
