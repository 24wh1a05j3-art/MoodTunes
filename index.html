<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTunes</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Heading -->
        <h1>🎵 MoodTunes</h1>

        <p class="subtitle">
            Find music that matches your mood.
        </p>

        <!-- Dark Mode -->
        <button id="themeBtn">🌙 Dark Mode</button>

        <!-- AI Mood Input -->
        <div class="mood-section">

            <h2>Tell us how you feel</h2>

            <input
                type="text"
                id="moodInput"
                placeholder="Example: I feel happy today">

            <button id="findMood">
                🔍 Find My Mood
            </button>

            <button id="voiceBtn">
                🎤 Speak
            </button>

        </div>

        <br>

        <!-- Navigation Buttons -->

        <a href="favorites.html">
            <button id="favoritePage">
                ❤️ Favorites
            </button>
        </a>

        <a href="history.html">
            <button id="historyBtn">
                📜 Mood History
            </button>
        </a>

        <!-- Search Song -->

        <div class="card">

            <h2>🔍 Search Song</h2>

            <input
                type="text"
                id="searchSong"
                placeholder="Search any song...">

                
            <button id="searchBtn">
                Search
            </button>

        </div>

        <!-- Mood Buttons -->

        <div class="mood-section">

            <h2>Or Choose Your Mood</h2>

          
            <div class="mood-buttons">

                <button>😊 Happy</button>
                <button>😔 Sad</button>
                <button>❤️ Love</button>
                <button>😌 Relaxed</button>
                <button>⚡ Energetic</button>
                <button>😡 Angry</button>

            </div>

        </div>

        <!-- Recommended Songs -->

        <div class="card">

            <h2>🎵 Recommended Songs</h2>

            <ul id="songList">

                <li>Select a mood to see songs.</li>

            </ul>

        </div>

        <!-- Quote -->

        <div class="card">

            <h2>💬 Quote of the Day</h2>

            <p id="quote">

                Every day is a fresh start.

            </p>

        </div>

        <!-- Wallpaper -->

        <div class="card">

            <h2>🖼️ Mood Wallpaper</h2>

            <img
                id="wallpaper"
                src="https://picsum.photos/id/1025/900/400"
                alt="Mood Wallpaper">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
